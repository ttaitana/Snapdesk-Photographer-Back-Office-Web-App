<svg viewBox="0 0 480 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="โต๊ะทำงานช่างภาพ มีกล้อง คลิปบอร์ดเช็คลิสต์ คิวอาร์โค้ด และเหรียญ">
  <!--
    Original hand-drawn illustration — P10 task #5 (TASKS.md). No traced or
    copyrighted reference used; every shape below is plain SVG primitives
    composed by hand, in the same retro-tech/comic-panel language as
    public/icons/icon-source.svg (thick #16202b ink outlines, flat spec
    colors, a halftone dot field instead of gradients/photos). Themed around
    Snapdesk's "back office, not the shoot itself" pitch: a desk holding a
    camera (the work), a checklist (job tracking), a QR square (delivery),
    and a coin (income/tax) — see SPEC.md §1 for the four pillars this maps
    to. Reused as the landing-page hero in app/page.tsx.
  -->
  <defs>
    <pattern id="deskHalftone" width="10" height="10" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#16202b" opacity="0.08" />
    </pattern>
  </defs>

  <rect width="480" height="360" fill="#dce9f5" />
  <rect width="480" height="360" fill="url(#deskHalftone)" />

  <!-- desk -->
  <rect x="20" y="270" width="440" height="22" rx="4" fill="#ffffff" stroke="#16202b" stroke-width="4" />
  <rect x="48" y="292" width="20" height="48" fill="#ffffff" stroke="#16202b" stroke-width="4" />
  <rect x="412" y="292" width="20" height="48" fill="#ffffff" stroke="#16202b" stroke-width="4" />

  <!-- clipboard (job tracking) -->
  <g transform="translate(56,150)">
    <rect x="0" y="0" width="108" height="132" rx="8" fill="#ffffff" stroke="#16202b" stroke-width="4" />
    <rect x="30" y="-10" width="48" height="20" rx="4" fill="#ffd21e" stroke="#16202b" stroke-width="4" />
    <line x1="18" y1="34" x2="90" y2="34" stroke="#16202b" stroke-width="3" stroke-linecap="round" />
    <line x1="18" y1="54" x2="90" y2="54" stroke="#16202b" stroke-width="3" stroke-linecap="round" />
    <line x1="18" y1="74" x2="68" y2="74" stroke="#16202b" stroke-width="3" stroke-linecap="round" />
    <g transform="translate(18,94)">
      <rect width="18" height="18" rx="3" fill="#2fa46a" stroke="#16202b" stroke-width="3" />
      <path d="M4 9 L8 13 L14 5" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
    </g>
    <rect x="44" y="94" width="46" height="18" rx="3" fill="#f5f0e6" stroke="#16202b" stroke-width="2" opacity="0.5" />
  </g>

  <!-- coin (income/tax) -->
  <g transform="translate(360,206)">
    <circle cx="0" cy="0" r="38" fill="#ffd21e" stroke="#16202b" stroke-width="4" />
    <circle cx="0" cy="0" r="26" fill="none" stroke="#16202b" stroke-width="2.5" opacity="0.6" />
    <text x="0" y="9" text-anchor="middle" font-family="Georgia, serif" font-size="28" font-weight="700" fill="#16202b">฿</text>
  </g>

  <!-- QR square (delivery) -->
  <g transform="translate(330,120)">
    <rect x="0" y="0" width="56" height="56" rx="6" fill="#ffffff" stroke="#16202b" stroke-width="4" />
    <rect x="8" y="8" width="14" height="14" fill="#16202b" />
    <rect x="34" y="8" width="14" height="14" fill="#16202b" />
    <rect x="8" y="34" width="14" height="14" fill="#16202b" />
    <rect x="30" y="30" width="6" height="6" fill="#16202b" />
    <rect x="40" y="30" width="6" height="6" fill="#16202b" />
    <rect x="30" y="40" width="6" height="6" fill="#16202b" />
    <rect x="40" y="40" width="6" height="6" fill="#e23b3b" />
  </g>

  <!-- camera (the shoot itself, sitting on the desk as "done, now log it") -->
  <g transform="translate(186,176)">
    <rect x="0" y="22" width="128" height="86" rx="10" fill="#2e7dc4" stroke="#16202b" stroke-width="5" />
    <rect x="40" y="2" width="48" height="24" rx="6" fill="#2e7dc4" stroke="#16202b" stroke-width="5" />
    <circle cx="64" cy="66" r="30" fill="#16202b" />
    <circle cx="64" cy="66" r="22" fill="#0e1620" stroke="#dce9f5" stroke-width="2" />
    <circle cx="64" cy="66" r="9" fill="#4fa3e3" />
    <circle cx="56" cy="58" r="3" fill="#ffffff" opacity="0.6" />
    <rect x="98" y="36" width="16" height="10" rx="2" fill="#ffd21e" stroke="#16202b" stroke-width="3" />
  </g>

  <!-- little motion/halftone flourish -->
  <g fill="#16202b" opacity="0.25">
    <circle cx="150" cy="100" r="3" />
    <circle cx="168" cy="86" r="2.4" />
    <circle cx="186" cy="74" r="1.8" />
  </g>
</svg>
